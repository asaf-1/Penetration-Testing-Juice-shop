name: Bug report
description: Report a problem with the audit runner, reporter, or tooling
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please do **not** include findings or details
        about third-party systems you are not authorized to test.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npm run ...`
        2. ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Audit specs (Playwright)
        - Security rules (pure logic)
        - Reporter (HTML/MD/JSON/SARIF)
        - Docker / compose
        - CI / GitHub Actions
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: 'OS, Node version, Docker version'
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
