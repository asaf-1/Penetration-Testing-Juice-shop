name: Security Audit Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      fail_on:
        description: 'Severity gate threshold (off keeps the run report-only)'
        type: choice
        default: 'off'
        options:
          - 'off'
          - Low
          - Medium
          - High
          - Critical

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-coverage
          path: coverage/
          retention-days: 14

  security-audit:
    name: Isolated DAST Audit (OWASP Juice Shop)
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      # Required to publish SARIF results to the Security tab.
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run isolated Docker security audit
        run: npm run docker:audit

      - name: Generate job summary
        if: always()
        run: npm run audit:summary

      - name: Severity gate (report-only by default)
        if: always()
        env:
          # Report-only by default. Run the workflow manually (workflow_dispatch)
          # and pick a threshold to block on a real target.
          FAIL_ON: ${{ inputs.fail_on || 'off' }}
        run: npm run audit:gate

      - name: Upload SARIF to code scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/security-report.sarif
          category: playwright-security-lab

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-audit-reports
          path: |
            reports/
            playwright-report/
          retention-days: 14

      - name: Clean up Docker containers
        if: always()
        run: npm run docker:down
