version: 2
updates:
  # One grouped PR per ecosystem, monthly, to keep notification volume low.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      npm-all:
        patterns:
          - '*'
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      actions-all:
        patterns:
          - '*'
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - docker
